openapi: "3.0.3"
info:
  title: E-Commerce API
  description: |
    A realistic e-commerce mock API. Import this spec into Thodr to instantly
    generate all endpoints with sample response bodies.
  version: "1.0.0"
  contact:
    name: Thodr
    url: https://thodr.com

servers:
  - url: https://thodr.com/api/mock/{project-slug}
    description: Your Thodr mock server

paths:
  /products:
    get:
      summary: List all products
      operationId: listProducts
      tags: [Products]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
              example:
                - id: "prod_001"
                  name: "Wireless Headphones"
                  price: 7999
                  currency: "usd"
                  category: "electronics"
                  in_stock: true
                - id: "prod_002"
                  name: "Mechanical Keyboard"
                  price: 12999
                  currency: "usd"
                  category: "electronics"
                  in_stock: true
                - id: "prod_003"
                  name: "USB-C Hub"
                  price: 4999
                  currency: "usd"
                  category: "accessories"
                  in_stock: false

  /products/{id}:
    get:
      summary: Get product by ID
      operationId: getProduct
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
              example:
                id: "prod_001"
                name: "Wireless Headphones"
                description: "Premium noise-cancelling wireless headphones with 30-hour battery life."
                price: 7999
                currency: "usd"
                category: "electronics"
                in_stock: true
                images:
                  - "https://images.example.com/headphones-1.jpg"
                  - "https://images.example.com/headphones-2.jpg"
                created_at: "2026-01-15T10:00:00Z"
        "404":
          description: Product not found
          content:
            application/json:
              example:
                error:
                  code: "PRODUCT_NOT_FOUND"
                  message: "No product found with the given ID."

  /cart:
    get:
      summary: Get current cart
      operationId: getCart
      tags: [Cart]
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              example:
                id: "cart_abc123"
                items:
                  - product_id: "prod_001"
                    name: "Wireless Headphones"
                    quantity: 1
                    unit_price: 7999
                  - product_id: "prod_003"
                    name: "USB-C Hub"
                    quantity: 2
                    unit_price: 4999
                subtotal: 17997
                currency: "usd"

    post:
      summary: Add item to cart
      operationId: addToCart
      tags: [Cart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
            example:
              product_id: "prod_001"
              quantity: 1
      responses:
        "201":
          description: Item added
          content:
            application/json:
              example:
                message: "Item added to cart"
                cart_id: "cart_abc123"
                item_count: 3

  /orders:
    get:
      summary: List orders
      operationId: listOrders
      tags: [Orders]
      responses:
        "200":
          description: Order list
          content:
            application/json:
              example:
                - id: "ord_001"
                  status: "delivered"
                  total: 7999
                  currency: "usd"
                  created_at: "2026-04-10T14:30:00Z"
                - id: "ord_002"
                  status: "processing"
                  total: 17997
                  currency: "usd"
                  created_at: "2026-05-20T09:15:00Z"

    post:
      summary: Create an order
      operationId: createOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            example:
              cart_id: "cart_abc123"
              shipping_address:
                line1: "123 Main St"
                city: "San Francisco"
                state: "CA"
                postal_code: "94102"
                country: "US"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              example:
                id: "ord_003"
                status: "pending"
                total: 17997
                currency: "usd"
                estimated_delivery: "2026-06-01"
                created_at: "2026-05-25T12:00:00Z"

  /orders/{id}:
    get:
      summary: Get order by ID
      operationId: getOrder
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              example:
                id: "ord_001"
                status: "delivered"
                items:
                  - product_id: "prod_001"
                    name: "Wireless Headphones"
                    quantity: 1
                    unit_price: 7999
                total: 7999
                currency: "usd"
                shipping_address:
                  line1: "123 Main St"
                  city: "San Francisco"
                  state: "CA"
                  postal_code: "94102"
                  country: "US"
                created_at: "2026-04-10T14:30:00Z"
                delivered_at: "2026-04-14T11:00:00Z"

  /users/{id}:
    get:
      summary: Get user profile
      operationId: getUser
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              example:
                id: "usr_42"
                name: "Jane Doe"
                email: "jane@example.com"
                plan: "pro"
                created_at: "2025-11-01T08:00:00Z"

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price in cents
        currency:
          type: string
        category:
          type: string
        in_stock:
          type: boolean
        images:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
